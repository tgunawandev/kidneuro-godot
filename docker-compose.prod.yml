# =============================================================================
# KidNeuro Godot - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-50m}"
    max-file: "${LOG_MAX_FILES:-5}"

x-labels: &monitoring-labels
  logging.collector: "true"
  logging.service: "kidneuro"
  logging.environment: "production"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "postgres"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-2}"
          memory: "${POSTGRES_MEMORY_LIMIT:-4G}"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "redis"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: "${REDIS_MEMORY_LIMIT:-512M}"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]

  # ---------------------------------------------------------------------------
  # API - Database Migration (runs once, then exits)
  # ---------------------------------------------------------------------------
  api-migrate:
    image: ${IMAGE_REGISTRY:-ghcr.io/tgunawandev}/kidneuro-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: "no"
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "api-migrate"
    command: ["migrate"]
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"

  # ---------------------------------------------------------------------------
  # API - FastAPI Application
  # ---------------------------------------------------------------------------
  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/tgunawandev}/kidneuro-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "api"
      traefik.enable: "true"
      traefik.http.routers.kidneuro-api.rule: "Host(`api.${DOMAIN}`)"
      traefik.http.routers.kidneuro-api.entrypoints: "websecure"
      traefik.http.routers.kidneuro-api.tls.certresolver: "letsencrypt"
      traefik.http.services.kidneuro-api.loadbalancer.server.port: "8000"
      # WebSocket support
      traefik.http.middlewares.kidneuro-api-ws.headers.customrequestheaders.X-Forwarded-Proto: "https"
      traefik.http.routers.kidneuro-api-ws.rule: "Host(`api.${DOMAIN}`) && PathPrefix(`/ws`)"
      traefik.http.routers.kidneuro-api-ws.entrypoints: "websecure"
      traefik.http.routers.kidneuro-api-ws.tls.certresolver: "letsencrypt"
    expose:
      - "8000"
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - internal
      - dokploy-network
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-2}"
          memory: "${API_MEMORY_LIMIT:-2G}"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

  # ---------------------------------------------------------------------------
  # API - Celery Worker (background tasks: analytics, reports, notifications)
  # ---------------------------------------------------------------------------
  worker:
    image: ${IMAGE_REGISTRY:-ghcr.io/tgunawandev}/kidneuro-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "worker"
    command: ["worker"]
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - internal
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT:-2}"
          memory: "${WORKER_MEMORY_LIMIT:-2G}"

  # ---------------------------------------------------------------------------
  # API - Celery Beat (scheduled tasks: daily reports, cleanup)
  # ---------------------------------------------------------------------------
  beat:
    image: ${IMAGE_REGISTRY:-ghcr.io/tgunawandev}/kidneuro-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "beat"
    command: ["beat"]
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - internal
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # ---------------------------------------------------------------------------
  # Web - Next.js Dashboard (therapist/parent portal)
  # ---------------------------------------------------------------------------
  web:
    image: ${IMAGE_REGISTRY:-ghcr.io/tgunawandev}/kidneuro-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "web"
      traefik.enable: "true"
      traefik.http.routers.kidneuro-web.rule: "Host(`dashboard.${DOMAIN}`)"
      traefik.http.routers.kidneuro-web.entrypoints: "websecure"
      traefik.http.routers.kidneuro-web.tls.certresolver: "letsencrypt"
      traefik.http.services.kidneuro-web.loadbalancer.server.port: "3000"
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
      NEXT_PUBLIC_APP_URL: https://dashboard.${DOMAIN}
      NEXT_PUBLIC_GAME_URL: https://games.${DOMAIN}
      NEXT_PUBLIC_POSTHOG_KEY: ${POSTHOG_API_KEY}
      NEXT_PUBLIC_POSTHOG_HOST: ${POSTHOG_HOST}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - internal
      - dokploy-network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${WEB_CPU_LIMIT:-1}"
          memory: "${WEB_MEMORY_LIMIT:-1G}"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:3000"]

  # ---------------------------------------------------------------------------
  # Games - Nginx serving Godot HTML5 exports
  # ---------------------------------------------------------------------------
  games:
    image: ${IMAGE_REGISTRY:-ghcr.io/tgunawandev}/kidneuro-games:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    labels:
      <<: *monitoring-labels
      logging.component: "games"
      traefik.enable: "true"
      traefik.http.routers.kidneuro-games.rule: "Host(`games.${DOMAIN}`)"
      traefik.http.routers.kidneuro-games.entrypoints: "websecure"
      traefik.http.routers.kidneuro-games.tls.certresolver: "letsencrypt"
      traefik.http.services.kidneuro-games.loadbalancer.server.port: "8080"
      # Required headers for Godot HTML5 (SharedArrayBuffer)
      traefik.http.middlewares.kidneuro-games-headers.headers.customresponseheaders.Cross-Origin-Opener-Policy: "same-origin"
      traefik.http.middlewares.kidneuro-games-headers.headers.customresponseheaders.Cross-Origin-Embedder-Policy: "require-corp"
      traefik.http.routers.kidneuro-games.middlewares: "kidneuro-games-headers"
    expose:
      - "8080"
    networks:
      - internal
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
