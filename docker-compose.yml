# =============================================================================
# KidNeuro Godot - Local Development Docker Compose
# Usage: docker compose up -d  (or ./bin/ctl start)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kidneuro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kidneuro_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-kidneuro_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kidneuro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://kidneuro:kidneuro_dev_password@postgres:5432/kidneuro_dev
      REDIS_URL: redis://:redis_dev_password@redis:6379/0
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      LOG_LEVEL: debug
      LOG_FORMAT: text
    volumes:
      - ./api/src:/app/src
      - ./api/tests:/app/tests
      - ./api/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
